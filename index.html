<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Memória - Unidades</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">

    <!-- TELA INICIAL -->
    <section id="telaInicial" class="tela tela-inicial ativa">
      <div class="conteudo-inicial">

        <div class="texto-inicial">
          <h1>Jogo da Memória</h1>
          <h2>Unidades de Aprendizagem</h2>

          <p>
            Encontre os 5 pares corretos das imagens.
            Observe as cartas, memorize as posições e combine as unidades correspondentes.
          </p>
        </div>

        <!-- PREVIEW -->
        <div class="preview-cartas">
          <div class="carta-preview">
            <img src="imagens/unidade01.png" alt="Imagem unidade 01" />
          </div>

          <div class="carta-preview carta-preview-centro">
            <span>5 Pares</span>
          </div>

          <div class="carta-preview">
            <img src="imagens/unidade10.png" alt="Imagem unidade 10" />
          </div>
        </div>

        <button id="btnComecar" class="botao-principal">Começar jogo</button>
      </div>
    </section>

    <!-- TELA DO JOGO -->
    <section id="telaJogo" class="tela tela-jogo">
      <header class="cabecalho-jogo">
        <div class="titulos-jogo">
          <h1>Jogo da Memória</h1>
          <h2>Unidades de Aprendizagem</h2>
        </div>

        <div class="painel">
          <div class="info">
            Tentativas: <span id="tentativas">0</span>
          </div>

          <button id="reiniciar">Reiniciar</button>
          <button id="voltarInicio">Início</button>
        </div>
      </header>

      <div id="mensagem" class="mensagem"></div>

      <!-- ÁREA DO TABULEIRO -->
      <section class="area-tabuleiro">
        <div id="tabuleiro" class="tabuleiro">

          <!-- PAR 1 -->
          <div class="carta" data-par="1">
            <div class="face verso">
              <div class="conteudo-verso">
                <span class="simbolo-carta">IA</span>
              </div>
            </div>
            <div class="face frente">
              <img src="imagens/unidade01.png" alt="Imagem unidade 01" />
            </div>
          </div>

          <div class="carta" data-par="1">
            <div class="face verso">

            </div>
            <div class="face frente">

            </div>
          </div>

          <!-- PAR 2 -->
          <div class="carta" data-par="2">

            </div>
            <div class="face frente">
              <img src="imagens/unidade03.png" alt="Imagem unidade 03" />
            </div>
          </div>

          <div class="carta" data-par="2">
            <div class="face verso">
              <div class="conteudo-verso">
                <span class="simbolo-carta">IA</span>
              </div>
            </div>
            <div class="face frente">
              <img src="imagens/unidade04.png" alt="Imagem unidade 04" />
            </div>
          </div>

          <!-- PAR 3 -->
          <div class="carta" data-par="3">
            <div class="face verso">
              <div class="conteudo-verso">

              </div>
            </div>
            <div class="face frente">
              <img src="imagens/unidade05.png" alt="Imagem unidade 05" />
            </div>
          </div>

          <div class="carta" data-par="3">
            <div class="face verso">
              <div class="conteudo-verso">

              </div>
            </div>
            <div class="face frente">
              <img src="imagens/unidade06.png" alt="Imagem unidade 06" />
            </div>
          </div>

            </div>
            <div class="face frente">

              <div class="conteudo-verso">
                <span class="simbolo-carta">IA</span>
              </div>
            </div>
            <div class="face frente">
              <img src="imagens/unidade10.png" alt="Imagem unidade 10" />
            </div>
          </div>

        </div>
      </section>
    </section>

  </main>

  <script src="script.js"></script>

</html>
