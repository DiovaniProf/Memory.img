<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Jogo da Memória - Unidades</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="app">

    <!-- TELA INICIAL -->
    <section id="telaInicial" class="tela tela-inicial ativa">

      <div class="conteudo-inicial">

        <div class="texto-inicial">
          <h1>Jogo da Memória</h1>
          <h2>Unidades de Aprendizagem</h2>

          <p>
            Encontre os pares corretos das imagens. 
            O primeiro par é formado por <strong>unidade1</strong> e <strong>unidade2</strong>.
            O segundo par é formado por <strong>unidade3</strong> e <strong>unidade4</strong>.
          </p>
        </div>

        <!-- CARTAS DE PREVIEW DA TELA INICIAL -->
        <div class="preview-cartas">

          <div class="carta-preview">
            <img src="imagens/unidade1.png" alt="Imagem unidade 1">
          </div>

          <div class="carta-preview carta-preview-centro">
            2 Pares
          </div>

          <div class="carta-preview">
            <img src="imagens/unidade3.png" alt="Imagem unidade 3">
          </div>

        </div>

        <button id="btnComecar" class="botao-principal">
          Começar jogo
        </button>

      </div>

    </section>


    <!-- TELA DO JOGO -->
    <section id="telaJogo" class="tela tela-jogo">

      <header class="cabecalho-jogo">

        <div>
          <h1>Jogo da Memória</h1>
          <h2>Unidades de Aprendizagem</h2>
        </div>

        <div class="painel">

          <div class="info">
            Tentativas: <span id="tentativas">0</span>
          </div>

          <button id="reiniciar">Reiniciar</button>
          <button id="voltarInicio">Início</button>

        </div>

      </header>

      <div id="mensagem" class="mensagem"></div>

      <!-- TABULEIRO DO JOGO -->
      <section class="area-tabuleiro">

        <div class="tabuleiro" id="tabuleiro">

          <!-- PAR 1 -->
          <div class="carta" data-par="1">

            <div class="face verso">
              <div class="simbolo-carta">IA</div>
            </div>

            <div class="face frente">
              <img src="imagens/unidade1.png" alt="Imagem unidade 1">
            </div>

          </div>

          <div class="carta" data-par="1">

            <div class="face verso">
              <div class="simbolo-carta">IA</div>
            </div>

            <div class="face frente">
              <img src="imagens/unidade2.png" alt="Imagem unidade 2">
            </div>

          </div>


          <!-- PAR 2 -->
          <div class="carta" data-par="2">

            <div class="face verso">
              <div class="simbolo-carta">IA</div>
            </div>

            <div class="face frente">
              <img src="imagens/unidade3.png" alt="Imagem unidade 3">
            </div>

          </div>

          <div class="carta" data-par="2">

            <div class="face verso">
              <div class="simbolo-carta">IA</div>
            </div>

            <div class="face frente">
              <img src="imagens/unidade4.png" alt="Imagem unidade 4">
            </div>

          </div>

        </div>

      </section>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
